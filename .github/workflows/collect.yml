name: Daily signal collection

on:
  schedule:
    # 05:30 AM ET = 09:30 UTC
    # Runs first in the daily sequence, before forecast refresh and email
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to collect (YYYY-MM-DD, default: yesterday)'
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect signals
        env:
          AIRNOW_API_KEY:       ${{ secrets.AIRNOW_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          INPUT_DATE:           ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python scripts/collect_signals.py --date "$INPUT_DATE"
          else
            python scripts/collect_signals.py
          fi

      - name: Commit signals
        run: |
          git config user.name  "traumayellow-bot"
          git config user.email "bot@traumayellow.com"
          git add data/signals.csv
          git diff --cached --quiet || git commit -m "data: signals $(date -u +%Y-%m-%d)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
