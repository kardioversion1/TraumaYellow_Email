name: Daily forecast refresh

on:
  schedule:
    # 05:45 AM ET = 09:45 UTC
    # Runs after signal collection (05:30), before email (06:00)
    - cron: '45 9 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh forecast
        run: python scripts/refresh_forecast.py

      - name: Deploy predictions.json to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./predictions
          keep_files: false
          commit_message: "deploy: forecast refresh $(date -u +%Y-%m-%d)"
