name: Daily ED Prediction Email

on:
  schedule:
    # 06:00 AM ET = 11:00 UTC
    - cron: '0 11 * * *'   # 06:00 ET
  workflow_dispatch:

jobs:
  send-prediction-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-email-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install requests

      - name: Send prediction email
        env:
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECIPIENT:    ${{ secrets.RECIPIENT }}
        run: python scripts/send_prediction_email.py
