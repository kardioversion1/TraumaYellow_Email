name: Daily ED Prediction Email

on:
  schedule:
    # 11:00 UTC = 6:00 AM ET (EST) / 7:00 AM ET (EDT)
    # Note: GitHub Actions cron runs in UTC. Eastern is UTC-5 (EST) / UTC-4 (EDT).
    # Use 11:00 UTC to hit ~6 AM year-round (may shift 1hr during DST transitions).
    - cron: '0 11 * * *'
  # Manual trigger for testing — run from the Actions tab without waiting for cron
  workflow_dispatch:

jobs:
  send-prediction-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-email-${{ hashFiles('requirements-email.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-email-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-email.txt

      - name: Send prediction email
        env:
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECIPIENT:    ${{ secrets.RECIPIENT }}
        run: python scripts/send_prediction_email.py
