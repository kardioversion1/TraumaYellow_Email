name: Daily forecast email

on:
  schedule:
    # 06:00 AM ET = 10:00 UTC
    # Runs after signal collection (05:30) and forecast refresh (05:45)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-email-${{ hashFiles('requirements-email.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-email.txt

      - name: Send forecast email
        env:
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECIPIENT:    ${{ secrets.RECIPIENT }}
        run: python scripts/send_prediction_email.py
