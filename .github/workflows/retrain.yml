name: Weekly model retrain

on:
  schedule:
    # 07:00 AM ET Sunday = 12:00 UTC Sunday
    # Runs after Saturday signals are collected
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retrain model
        run: python scripts/retrain.py

      - name: Commit model + data outputs
        if: env.RETRAIN_STATUS == 'ok'
        run: |
          git config user.name  "traumayellow-bot"
          git config user.email "bot@traumayellow.com"
          git add model/model.pkl model/feature_list.json
          git add data/model_metrics.json data/predictions_history.csv
          git diff --cached --quiet || git commit -m \
            "model: retrain $(date -u +%Y-%m-%d) · MAE=${{ env.RETRAIN_MAE }} · N=${{ env.RETRAIN_ROWS }} rows"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Deploy predictions.json to GitHub Pages
        if: env.RETRAIN_STATUS == 'ok'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./predictions
          keep_files:   false
          commit_message: "deploy: predictions $(date -u +%Y-%m-%d)"
